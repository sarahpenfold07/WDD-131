<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
                
    
    <title>Document</title>
    <link rel="stylesheet" href="recipe_book.css"> 
</head>
<body>
    <section id="header">
        <div id="logo">
            <img src="../images/images (1)/images/recipe-book.png" alt="logo">
        </div>
        <div id="recipe-text">
            <p>RecipeBook</p>
        </div>
    </section>

    <section id="search-bar">
        <div id="search-text">
            <label for="recipe-search"></label>
            <input type="text" id="recipe-search" name="recipe-search" value="Find a Recipe">
            <img src="../images/images (1)/images/search.svg" alt="Search bar">
        </div>
    </section>

    <section id="recipe-container">
        <div id="apple-crisp-img">
            <img src="../images/images (1)/images/apple-crisp.jpg" alt="Apple crisp">
        </div>

        <div id="button">
            <button>
                Dessert
            </button>
        </div>

        <div id="recipe-content">
            <p><strong>Apple Crisp</strong></p>
            <span
            class="rating"
            role="img"
            aria-label="Rating: 4 out of 5 stars"
            >
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
            <p>This apple crisp recipe is a simple yet delicious fall desser that's great served warm with vanilla ice cream. </p>
        </div>
    </section>

    <section id="footer">
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="../images/images (1)/images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="../images/images (1)/images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="../images/images (1)/images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div> 
        <div id="link">
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
        </div> 
    </section>
</body>
</html>
