<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card</title>
    <link rel="stylesheet" href="credit_card_form.css"/>
    <script src="credit_card_form.js" defer></script>
</head>
<body>
    <header><h1>Card</h1></header>
    <main>
        <form id="checkoutForm" action="completed.html" method="get">
        <div class="cardContainer">
        <section id="front">
            <div id="total">
                <p>Total: $199</p>
            </div> 
            <div id="creditCard">
                <p>💳</p>
            </div>
            <div id="cardNum">
                <label for="cardNumber">CARD NUMBER</label>
                <input type='text' id='card' name='cardNumber' placeholder="Enter the 16-digit number" aria-labelledby="cardNumber">
            </div>
            <div id="cardHold">
                <label for="cardHolder">CARD HOLDER</label>
                <input type='text' id='holder' name='cardNumber' placeholder="Jane Doe" aria-labelledby="cardHolder">
            </div>          
            <div id="cardExpiration">
                <label for="expirationDate">EXPIRATION</label>
                <input type='text' id='month' name="expMonth" placeholder="MM" aria-labelledby="expirationDate">
                <input type='text' id='year' name="expYear" placeholder="YY" aria-labelledby="expirationDate">
            </div>
        </section>
        <section id="back">
            <div id="cvc">
                <label for="cvc">CVC/CV</label>
                <input type='text' id='securityCode' name='securityCode' placeholder="xxx" aria-labelledby="cvc">
            </div>
        </section>
        <div>
            <button type="submit">Submit</button>
            </div>
        </div>
        </form>
    </main>
</body>
</html>
