<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
                
    
    <title>Document</title>
    <link rel="stylesheet" href="recipe_2.css"> 
    <script src="recipe_2.js" defer></script>
</head>
<body>
    <section id="header">
        <div id="logo">
            <img src="../../week_9/images/recipe-book.png" alt="logo">
        </div>
        <div id="recipe-text">
            <p>RecipeBook</p>
        </div>
    </section>

    <div id="search-bar">
        <label for="search">Enter Search</label>
        <input id="search" type="text">
        <button>Search</button>
    </div>

    <section id="recipe-container">

        <div id="button">

        </div>

        <div id="recipe-content">
            
        </div>

    </section>

    <section id="footer">
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="../../week_9/images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="../../week_9/images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="../../week_9/images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div> 
        <div id="link">
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
        </div> 
    </section>
</body>
</html>
